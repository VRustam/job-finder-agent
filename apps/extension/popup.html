<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0a;
      color: #f5f5f5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-b: 1px solid #262626;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
      border-radius: 6px;
    }
    .title {
      font-size: 14px;
      font-weight: 800;
      background: linear-gradient(to right, #ffffff, #a3a3a3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      background-color: #171717;
      border: 1px solid #262626;
      border-radius: 9999px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #ef4444; /* red by default */
    }
    .status-dot.connected {
      background-color: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }
    .server-input-group {
      margin-bottom: 16px;
    }
    .label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: #a3a3a3;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .input {
      width: 100%;
      box-sizing: border-box;
      background-color: #171717;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus {
      border-color: #a855f7;
    }
    .instruction-card {
      background-color: #171717;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 12px;
      font-size: 11px;
      line-height: 1.5;
      color: #d4d4d4;
    }
    .instruction-step {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .instruction-step:last-child {
      margin-bottom: 0;
    }
    .bullet {
      color: #a855f7;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <div class="title">Job Finder Sync</div>
  </div>

  <div class="status-badge">
    <div id="status-dot" class="status-dot"></div>
    <span id="status-text">Checking Connection...</span>
  </div>

  <div class="server-input-group">
    <label class="label">Dashboard Server URL</label>
    <input type="text" id="server-url" class="input" value="http://localhost:3000" />
  </div>

  <div class="instruction-card">
    <label class="label" style="margin-top: 0; margin-bottom: 8px;">How to use</label>
    <div class="instruction-step">
      <span class="bullet">1.</span>
      <span>Log into your Job Finder Agent dashboard.</span>
    </div>
    <div class="instruction-step">
      <span class="bullet">2.</span>
      <span>Navigate to any LinkedIn Job description. You will see a <strong>"Sync to Job Finder"</strong> button near the job title.</span>
    </div>
    <div class="instruction-step">
      <span class="bullet">3.</span>
      <span>In LinkedIn Messages, click <strong>"Suggest Reply"</strong> next to recruiter chats.</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
