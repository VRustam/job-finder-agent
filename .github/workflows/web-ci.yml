name: Web App CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/web/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/web/**'

jobs:
  build:
    name: Lint & Build Next.js
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
