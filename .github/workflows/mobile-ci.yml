name: Mobile App CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'apps/mobile/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'apps/mobile/**'

jobs:
  analyze_and_test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Linter/Analyzer
        run: flutter analyze

      - name: Run Tests
        run: flutter test || echo "No tests configured yet"
